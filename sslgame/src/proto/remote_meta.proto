syntax = "proto2";

package remote;

// Host -udp> Multicast

// Advertisement packets are continuously broadcast by the host to allow clients to initiate a connection.
message HostAdvertisement {
    required uint32 websocket_port = 1;
    // Display name of this host (usually the device hostname)
    optional string hostname = 2;
    // Random per-instance id to allow clients to recognise hosts across multiple network interfaces.
    optional uint32 instance_id = 3;
}

// Client -ws> Host

// Subscribe to updates for any number of websocket streams. A new subscription will always
// send the current state once and then only retransmit when its value changes.
message WsStreamRequest {
    enum WsStream {
        FieldGeometry = 1;
        GameState = 2;
        VisMappings = 3;
    }

    repeated WsStream stream = 1;
}

// Subscribe to any number of udp streams. Each stream continuously sends its
// full state each frame, making them useful for highly dynamic data.
message UdpStreamRequest {
    enum UdpStream {
        WorldState = 1;
        Visualizations = 2;
    }

    repeated UdpStream stream = 1;
    required uint32 port = 2;
}
