syntax = "proto2";

package remote;

import "remote_commands.proto";
import "remote_meta.proto";
import "remote_status.proto";

// All coordinates use the same global coordinate system, like vision coordinates but in meters instead of millimeters.
// That means: (right-handed, z up, x towards blue goal, +x forward)
// TODO: More protocol documentation

// Root packer: Client -ws> Host
message WsRequest {
    oneof content {
        WsStreamRequest ws_stream_req = 1;
        UdpStreamRequest udp_stream_req = 2;
        VisualizationFilter set_vis_filter = 3;
        RobotMoveCommand move_robot = 4;
    }
}

// Root packet: Host -ws> Client
message WsPacket {
    oneof content {
        FieldGeometry geom = 1;
        GameState game_state = 2;
        VisMappings vis_mappings = 3;
    }
}

// Root packet: Host -udp> Client
message UdpPacket {
    oneof content {
        WorldState world_state = 1;
        VisualizationUpdate vis_update = 2;
    }
}
